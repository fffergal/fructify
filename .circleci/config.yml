---
version: 2
jobs:
  test_python:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run: pip install uv
      - run: uv sync --frozen
      - run: uv run black --check .
      - run: uv run flake8
      - run: uv run tox
      - run: uv lock --check
  test_javascript:
    docker:
      - image: cimg/node:22.22
    steps:
      - checkout
      - run: npm ci
      - run: npm run lint
workflows:
  version: 2
  test:
    jobs:
      - test_python
      - test_javascript
